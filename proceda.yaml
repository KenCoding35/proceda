llm:
  model: ollama_chat/qwen3.5:9b
  temperature: 0.7
  max_tokens: 2048

apps:
  - name: gws
    description: Google Workspace (Calendar, Drive)
    transport: stdio
    command: ["gws", "mcp", "-s", "calendar,drive"]

  - name: time-left
    description: Time remaining in day, week, month, year
    transport: stdio
    command: ["uv", "run", "python", "examples/toy-greeting/time_left_server.py"]
